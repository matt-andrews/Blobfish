[node]
cluster_id   = "dev-cluster"
node_id      = "auto"
bind_addr    = "0.0.0.0:8080"

[storage]
chunk_size_bytes    = 8388608  # 8 MiB
chunk_dir = "/data/blobfish/chunks"
staging_ttl_seconds = 86400

[metadata]
engine = "redb"
path   = "/data/blobfish/meta.redb"

[placement]
replication_factor = 1

[observability]
log_level = "debug"
